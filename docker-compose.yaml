name: homelab

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: homeassistant
    ports:
      - "8123:8123"
    # Running as host user for easier file permission management
    user: "${UID}:${GID}"
    # privileged removed; add back if you need USB / network discovery that fails without it
    environment:
      - TZ=America/Los_Angeles  # PST
    volumes:
      - ./data/homeassistant:/config  # entire HA config; manage via UI
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    depends_on:
      - mosquitto
    networks:
      - home_default
  # Caddy (reverse proxy) is optional and starts after HA

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"  # websockets (optional)
    user: "${UID}:${GID}"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - home_default

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_AGREE=true
      - DOMAIN=${DOMAIN}
      - ESPHOME_USERNAME=${ESPHOME_USERNAME}
      - ESPHOME_PASSWORD=${ESPHOME_PASSWORD}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/christmas-party:/srv/christmas-party
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - homeassistant
    restart: unless-stopped
    networks:
      - home_default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cloudflare-ddns:
    image: oznu/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    environment:
      - API_KEY=${CLOUDFLARE_API_TOKEN}
      - ZONE=${DOMAIN}
      - SUBDOMAIN=@
      - PROXIED=false
    network_mode: host
    restart: unless-stopped

  esphome:
    image: esphome/esphome:latest
    container_name: esphome
    volumes:
      - ./data/esphome:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
      - PLATFORMIO_CORE_DIR=/config/.esphome/platformio
    ports:
      - "6052:6052"  # ESPHome dashboard
      - "6123:6123"  # OTA updates
    restart: unless-stopped
    networks:
      - home_default
    user: "${UID}:${GID}"

  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: palworld
    restart: unless-stopped
    ports:
      - "8211:8211/udp"
      - "27015:27015/udp"
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - PORT=8211
      - PLAYERS=16
      - MULTITHREADING=true
      - RCON_ENABLED=true
      - RCON_PORT=25575
      - TZ=America/Los_Angeles
      - COMMUNITY=true
      - SERVER_NAME=Nog Island
      - SERVER_PASSWORD=squirt
      - ENABLE_PLAYER_LOGGING=true
      - AUTO_PAUSE_ENABLED=true
      - ADMIN_PASSWORD=${PALWORLD_ADMIN_PASSWORD}
      - DIFFICULTY=Hard
      - PAL_EGG_DEFAULT_HATCHING_TIME=0.5
      - PUBLIC_IP=pal.${DOMAIN}
      - PUBLIC_PORT=8211
    volumes:
      - ./data/palworld:/palworld
    networks:
      - home_default

volumes:
  caddy_data: {}
  caddy_config: {}

networks:
  home_default:
    external: true

