- id: '1755761198542'
  alias: Increase higher brightness
  description: ''
  triggers:
  - device_id: cb12369100a00d6059b100f569a8f0b7
    domain: hue
    type: initial_press
    subtype: 2
    unique_id: 14613278-a45d-4390-8cdb-8e0ba09bfdb6
    trigger: device
  conditions: []
  mode: restart
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.kitchen_dimming
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.kitchen_dimming
        state: 'on'
      - condition: state
        entity_id: light.kitchen_all
        state: 'on'
      - condition: template
        value_template: '{{ repeat.index < 40 }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.kitchen_all
        data:
          brightness_step_pct: 4
          transition: 0.3
      - delay:
          milliseconds: 250
