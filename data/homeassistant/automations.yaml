      area_id: closet
  mode: single
- id: '1755762460777'
  alias: Closet motion off
  description: ''
  triggers:
  - type: no_motion
    device_id: f774ae3b8b0050770a392fdd7293ab88
    entity_id: af0cbcb2a6b56b41d94709b2c4c43611
    domain: binary_sensor
    trigger: device
    for:
      hours: 0
      minutes: 2
      seconds: 0
  conditions: []
  actions:
  - action: light.turn_off
    metadata: {}
    data: {}
    target:
      area_id: closet
  mode: single
