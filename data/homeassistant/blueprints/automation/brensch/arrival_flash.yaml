blueprint:
  name: Arrival flash
  description: >
    When a person arrives home, snapshot the chosen lights, blink them a
    colour a few times, then restore them to exactly what they were before.
  domain: automation
  input:
    arrival_tracker:
      name: Person device tracker
      description: The device_tracker whose arrival triggers the flash.
      selector:
        entity:
          filter:
            domain: device_tracker
    flash_lights:
      name: Lights to flash
      description: Light(s) or group(s) to blink and then restore.
      selector:
        entity:
          multiple: true
          filter:
            domain: light
    flash_color:
      name: Flash colour
      description: RGB colour to blink.
      selector:
        color_rgb: {}
    flash_count:
      name: Number of blinks
      default: 3
      selector:
        number:
          min: 1
          max: 10
    flash_lock:
      name: Arrival flash lock
      description: >
        A shared input_boolean used as a mutex. Give every arrival-flash
        automation the SAME helper so simultaneous arrivals run one-at-a-time
        and each snapshots the true prior state.
      selector:
        entity:
          filter:
            domain: input_boolean

mode: restart

variables:
  lights: !input flash_lights
  color: !input flash_color
  count: !input flash_count
  lock_entity: !input flash_lock
  restore_scene: "scene.arrival_restore_{{ this.entity_id.split('.')[1] }}"

triggers:
  - trigger: zone
    entity_id: !input arrival_tracker
    zone: zone.home
    event: enter

conditions: []

actions:
  # 0. Serialize: wait for any in-progress arrival flash to fully finish
  #    (including its restore), then claim the lock. Self-heals after 30s
  #    if a previous run left the lock stuck.
  - wait_template: "{{ is_state(lock_entity, 'off') }}"
    timeout: "00:00:30"
    continue_on_timeout: true
  - action: input_boolean.turn_on
    target:
      entity_id: !input flash_lock
  # 1. Snapshot current state so we can put it back exactly as it was.
  - action: scene.create
    data:
      scene_id: "arrival_restore_{{ this.entity_id.split('.')[1] }}"
      snapshot_entities: !input flash_lights
  # 2. Blink the colour.
  - repeat:
      count: "{{ count }}"
      sequence:
        - action: light.turn_on
          target:
            entity_id: !input flash_lights
          data:
            rgb_color: !input flash_color
            brightness_pct: 100
            transition: 0
        - delay:
            milliseconds: 400
        - action: light.turn_off
          target:
            entity_id: !input flash_lights
          data:
            transition: 0
        - delay:
            milliseconds: 300
  # 3. Restore whatever they were before the flash.
  - action: scene.turn_on
    target:
      entity_id: "{{ restore_scene }}"
    data:
      transition: 1
  # 4. Release the lock for the next arrival.
  - action: input_boolean.turn_off
    target:
      entity_id: !input flash_lock
